env = XCURSOR_SIZE,30
env = HYPRCURSOR_SIZE,30

input {
  kb_layout = fr
  kb_variant =
  kb_model =
  kb_options =
  kb_rules =
  sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
  accel_profile = custom
  force_no_accel = false
  scroll_points = 0.000 0.307 0.615 1.077 1.539 2.002 2.505 3.208 3.910 4.613 5.315 6.018 6.720 7.423 8.125 8.828 9.530 10.233 10.935 12.387

  touchpad {
    natural_scroll = true
    scroll_factor = 0.35
  }
}

gesture {
  # gesture = 4, right,    workspace, r+1
  # gesture = 4, left,     workspace, r-1
  gesture = 4, horizontal, workspace
  gesture = 4, up, special, magic
  gesture = 4, down, special, magic
}
